services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: mote_test
      POSTGRES_USER: mote
      POSTGRES_PASSWORD: mote_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mote -d mote_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:ro
