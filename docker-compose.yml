services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: asenix
      POSTGRES_USER: asenix
      POSTGRES_PASSWORD: asenix_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asenix -d asenix"]
      interval: 5s
      timeout: 5s
      retries: 5

  asenix:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://asenix:asenix_password@postgres:5432/asenix
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./asenix-ui
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      asenix:
        condition: service_healthy

volumes:
  postgres_data:
