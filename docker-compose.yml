services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: mote
      POSTGRES_USER: mote
      POSTGRES_PASSWORD: mote_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mote -d mote"]
      interval: 5s
      timeout: 5s
      retries: 5

  mote:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://mote:mote_password@postgres:5432/mote
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
